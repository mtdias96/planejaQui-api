name: CI Validation

on:
  pull_request:
    branches:
      - main
      - develop

env:
  DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

jobs:
  branch-flow-check:
    name: Validate Branch Flow (develop -> main)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Verify source branch is develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ ERROR: Pull Requests to 'main' must originate from the 'develop' branch."
            echo "Found source branch: '${{ github.head_ref }}'"
            echo "Please open your Pull Request against the 'develop' branch first."
            exit 1
          else
            echo "✅ SUCCESS: Pull Request originates from 'develop'."
          fi

  validate:
    name: Lint, Typecheck, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Typecheck
        run: pnpm run typecheck

      - name: Run Tests
        run: pnpm run test

      - name: Verify Build (Serverless Package)
        run: pnpm exec sls package
        env:
          AWS_ACCESS_KEY_ID: dummy-access-key-id
          AWS_SECRET_ACCESS_KEY: dummy-secret-access-key
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
