name: CI Validation

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Lint, Typecheck, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Typecheck
        run: pnpm run typecheck

      - name: Run Tests
        run: pnpm run test

      - name: Verify Build (Serverless Package)
        run: pnpm exec sls package
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
